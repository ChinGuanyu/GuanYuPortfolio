<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GuanYu — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/intro.css">
  <link rel="stylesheet" href="css/editor.css">
</head>
<body class="intro-body">

  <!-- Hand-drawn doodle background -->
  <svg class="doodles" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <g class="doodles__set">
      <!-- wireframe cube -->
      <path d="M120 180 l70 -30 l70 30 l-70 30 z" />
      <path d="M120 180 l0 70 l70 30 l0 -70" />
      <path d="M260 180 l0 70 l-70 30" />
      <!-- 5-point star -->
      <path class="doodle--clay" d="M1230 140 l18 40 l44 5 l-33 30 l9 44 l-38 -23 l-38 23 l9 -44 l-33 -30 l44 -5 z" />
      <!-- spiral -->
      <path d="M300 700 q30 -40 -10 -50 q-50 -12 -55 45 q-6 70 75 70 q95 0 90 -100" />
      <!-- squiggle -->
      <path d="M520 120 q20 -30 40 0 q20 30 40 0 q20 -30 40 0 q20 30 40 0" />
      <!-- smiley -->
      <circle cx="1130" cy="690" r="48" />
      <circle cx="1112" cy="678" r="4" class="doodle--fill" />
      <circle cx="1148" cy="678" r="4" class="doodle--fill" />
      <path d="M1106 702 q24 26 48 0" />
      <!-- planet + ring -->
      <circle cx="180" cy="470" r="34" class="doodle--clay" />
      <ellipse cx="180" cy="470" rx="64" ry="20" transform="rotate(-20 180 470)" class="doodle--clay" />
      <!-- arrow -->
      <path d="M760 760 q70 -30 140 -6" />
      <path d="M884 742 l16 12 l-20 12" />
      <!-- triangle -->
      <path d="M980 200 l40 70 l-80 0 z" />
      <!-- sparkles -->
      <path class="doodle--clay" d="M640 480 l0 28 M626 494 l28 0" />
      <path class="doodle--clay" d="M1320 460 l0 22 M1309 471 l22 0" />
      <path class="doodle--clay" d="M420 300 l0 22 M409 311 l22 0" />
      <!-- heart -->
      <path d="M1290 800 q-18 -22 -36 0 q-14 18 36 44 q50 -26 36 -44 q-18 -22 -36 0 z" />
      <!-- light bulb -->
      <circle cx="700" cy="300" r="26" />
      <path d="M690 326 l20 0 M692 336 l16 0" />
      <path d="M700 274 l0 -16 M674 300 l-16 0 M726 300 l16 0 M682 282 l-11 -11 M718 282 l11 -11" class="doodle--clay" />
      <!-- loose squiggle bottom-left -->
      <path d="M90 800 q30 20 60 0 q30 -20 60 0 q30 20 60 0" />
    </g>
  </svg>

  <main class="landing">
    <p class="mono-label landing__eyebrow">guanyu — 3d artist &amp; developer</p>
    <h1 class="landing__title">Things I build<br>have weight.</h1>
    <p class="landing__sub">A studio of characters, environments, and objects — sketched, sculpted, then shipped.</p>
    <a href="hub/" class="enter-btn">Enter the studio →</a>
  </main>

  <script type="module" src="js/editor.js"></script>
</body>
</html>
