<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GuanYu — 3D Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/inner.css?v=3">
  <link rel="stylesheet" href="../css/editor.css?v=3">
  <style>
    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: var(--space-1);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }

    .filter-btn {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.45rem 1rem;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 2px;
      color: var(--ink-dim);
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }
    .filter-btn:hover,
    .filter-btn.is-active {
      border-color: var(--clay);
      color: var(--clay);
    }
    .filter-btn.is-active {
      background: rgba(201, 123, 74, 0.08);
    }

    /* ── Project grid ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-3);
    }

    .project-card {
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 3px;
      overflow: hidden;
      transition: border-color 0.25s ease, transform 0.25s var(--ease-out);
      cursor: pointer;
    }
    .project-card:hover {
      border-color: var(--clay);
      transform: translateY(-3px);
    }

    /* Placeholder thumbnail — replaced by real <img> when assets are ready */
    .project-card__thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .project-card__thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 35% 40%, rgba(201,123,74,0.18) 0%, transparent 65%);
    }

    /* Subtle wireframe grid overlay to evoke the viewport aesthetic */
    .project-card__thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.4;
    }

    /* Each card gets a unique accent colour via its data-hue attribute */
    .project-card[data-hue="wire"] .project-card__thumb::after {
      background: radial-gradient(ellipse at 60% 50%, rgba(91,122,134,0.25) 0%, transparent 65%);
    }
    .project-card[data-hue="dim"] .project-card__thumb::after {
      background: radial-gradient(ellipse at 50% 30%, rgba(154,151,143,0.15) 0%, transparent 65%);
    }

    .project-card__label {
      position: absolute;
      bottom: var(--space-2);
      left: var(--space-2);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--wire);
      z-index: 1;
    }

    .project-card__body {
      padding: var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .project-card__meta {
      font-size: 0.7rem;
    }

    .project-card__title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
    }

    .project-card__desc {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--ink-dim);
    }

    .project-card__tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: var(--space-1);
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--line);
      border-radius: 2px;
      color: var(--ink-dim);
    }

    /* ── Hidden state for filter ── */
    .project-card.is-hidden {
      display: none;
    }

    /* ── Awards section ── */
    /* Hidden until it has at least one award — but always shown in editor mode */
    .awards-section {
      margin-top: 5rem;
      display: none;
    }
    body.editor-active .awards-section,
    .awards-section.has-cards,
    .awards-section:has(.project-card) {
      display: block;
    }
    .awards-head {
      margin-bottom: var(--space-3);
    }
    .awards-head .section-eyebrow {
      display: block;
      margin-bottom: var(--space-1);
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.1;
      margin: 0;
    }
    /* Empty award grid still reserves a little room in editor mode */
    #award-grid:empty {
      min-height: 0;
    }

    @media (max-width: 600px) {
      .project-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="page-shell">

  <nav class="site-nav">
    <a href="../hub/" class="site-nav__back">← Studio</a>
    <span class="site-nav__label">3D Projects</span>
  </nav>

  <header class="page-hero">

    <h1 class="page-hero__title">The Work.</h1>
    <p class="page-hero__sub">Characters, environments, and objects built in Blender and Unity. Every piece started as a sketch, then clay, then polygons.</p>
  </header>

  <div class="page-content">
    <div class="filter-bar" role="group" aria-label="Filter projects by category">
      <button class="filter-btn is-active" data-filter="all"><span class="filter-btn__label">All</span></button>
    </div>

    <section class="project-grid" id="project-grid">


    </section>

    <section class="awards-section">
      <div class="awards-head">
        <span class="mono-label section-eyebrow">recognition</span>

      </div>
      <div class="project-grid" id="award-grid"></div>

  </div>

    </nav>
  </footer>

  <script type="module" src="../js/editor.js?v=3"></script>
